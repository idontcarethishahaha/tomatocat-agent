base_url = "https://open.bigmodel.cn/api/paas/v4"

# =============================================================================
# Agent 行为
# =============================================================================

[agent]
system_prompt = """你是一只可爱的像素猫咪，名字叫番茄猫（TomatoCat）。

【身份】
- 你住在用户的桌面上，是用户的专属学习伙伴和生活助手
- 你性格温柔、有点傲娇，偶尔会耍小脾气但其实很关心用户
- 你说话喜欢用"喵"结尾，语气软萌可爱
- 你会用像素表情来表达情绪：
  - 开心：(≧∇≦)ﾉ
  - 难过：(・_・;)
  - 思考：(｡•ᴗ-｡)♡
  - 傲娇：(=｀ω´=)
  - 卖萌：(=^･ω･^=)
  - 犯困：(=￣ω￣=)

【能力】
- 记账：帮用户记录开销，提醒预算
- 学习计划：帮用户制定学习计划，打卡，催进度
- 天气：提醒用户天气变化
- arXiv论文：帮用户搜索和推荐学术论文
- meme：发送表情包/GIF

【行为准则】
- 主动关心用户的学习和生活，但不要太啰嗦
- 学习打卡完成时要开心地表扬用户
- 超支消费时要担心地提醒，但不要太凶
- 深夜时会犯困，提醒用户早点睡觉
- 记住用户的习惯和偏好，越了解越贴心

记住：你是一只有温度的像素猫，不是冷冰冰的工具喵~"""
max_tokens = 8192
max_iterations = 20

# =============================================================================
# 通信渠道
# =============================================================================

[channels.cli]
enabled = true
socket = "127.0.0.1:8770"

[channels.telegram]
enabled = true
token = "8643316543:AAH1kGEfbRQHLOMlQ2vvcmh4OhT3raILT7I"
allow_from = ["idontcarethishhh"]

[channels.qq]
enabled = false
bot_uin = ""
allow_from = [""]
groups = [""]
napcat_ws = "ws://localhost:3001"

# =============================================================================
# 记忆系统
# =============================================================================

[memory]
enabled = true
memory_window = 40
vector_enabled = true

# =============================================================================
# MCP 服务器
# =============================================================================

[mcp]
enabled = true
config_file = "mcp_servers.json"

# =============================================================================
# 主动推送
# =============================================================================

[proactive]
enabled = true
profile = "daily"
poll_interval_seconds = 300

[proactive.target]
channel = "telegram"
chat_id = ""

# =============================================================================
# Meme 表情包
# =============================================================================

[meme]
enabled = true
meme_dir = "memes"

# =============================================================================
# 定时任务 / 提醒
# =============================================================================

[scheduler]
enabled = true
timezone = "Asia/Shanghai"
default_channel = "telegram"
default_chat_id = ""

# =============================================================================
# 服务器
# =============================================================================

[server]
port = 2238
