# =============================================================================
# LLM 模型配置
# =============================================================================

[llm]
provider = "openai"

[llm.main]
model = "glm-4.5-flash"
api_key = "323ca7ec36f74fe8974f6c89b0d8ba3d.gFp2cFuAXke5ifib"
base_url = "https://open.bigmodel.cn/api/paas/v4"
enable_thinking = true
multimodal = false

[llm.fast]
model = "glm-4-flash"
api_key = "323ca7ec36f74fe8974f6c89b0d8ba3d.gFp2cFuAXke5ifib"
base_url = "https://open.bigmodel.cn/api/paas/v4"

[llm.vl]
model = "glm-4.6v-flash"
api_key = "323ca7ec36f74fe8974f6c89b0d8ba3d.gFp2cFuAXke5ifib"
